<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#333;
color:white;
padding:15px;
}

.container{
padding:30px;
}

form{
background:white;
padding:20px;
border-radius:8px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h2 id="welcome"></h2>
</div>

<div class="container">

<h3>Send Data</h3>

<form name="contact" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="contact">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit</button>

</form>

</div>

<script>

let user = localStorage.getItem("username");

document.getElementById("welcome").innerText = "Welcome " + user;

</script>

</body>

</html>
